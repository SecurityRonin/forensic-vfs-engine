name: Fuzz

# The resolver parses attacker-controllable disk bytes (MBR/GPT tables, filesystem
# boot sectors). Resolving arbitrary bytes must NEVER panic. PR CI smoke-runs the
# target briefly; the scheduled run fuzzes it for 10 minutes and uploads any crash.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'fuzz/**'
      - '.github/workflows/fuzz.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'fuzz/**'
      - '.github/workflows/fuzz.yml'
  schedule:
    - cron: "0 4 * * 1" # Mondays 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly
        with:
          toolchain: nightly
          components: rust-src
      - run: cargo install cargo-fuzz --locked
      - name: Run duration
        id: dur
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "secs=600" >> "$GITHUB_OUTPUT"
          else
            echo "secs=45" >> "$GITHUB_OUTPUT"
          fi
      - name: Fuzz fuzz_resolve
        run: cargo +nightly fuzz run fuzz_resolve -- -max_total_time=${{ steps.dur.outputs.secs }} -rss_limit_mb=4096
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fuzz-crash-resolve
          path: fuzz/artifacts/
          if-no-files-found: ignore
