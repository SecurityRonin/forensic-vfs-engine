[advisories]
version = 2
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    # Batteries-included: blazehash-core (the fleet forensic hasher) pulls
    # xxhash-rust (BSL-1.0) and tiny-keccak (CC0-1.0). Both are permissive and
    # legitimate forensic hashes — allow the licenses rather than amputate the
    # capability with default-features=false.
    "BSL-1.0",
    "CC0-1.0",
    # Batteries-included: archive-core's 7z/bzip2 decode path pulls libbz2-rs-sys
    # (pure-Rust bzip2, "bzip2-1.0.6") and ppmd-rust ("CC0-1.0 OR MIT-0"). Both
    # permissive — allow rather than amputate the archive-peel capability.
    "bzip2-1.0.6",
    "MIT-0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
